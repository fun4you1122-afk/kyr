[build]
  command   = "npm ci && npx next build"
  publish   = "out"
  base      = ""

[context.production]
  branch = "main"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/KYR.mp4"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
