name: Sync main to Netlify branch

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push main to Netlify deployment branch
        run: git push origin main:claude/eloquent-cerf-ZQWlE --force
